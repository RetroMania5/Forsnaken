<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forsnaken Art Tool</title>
<style>
  :root { --bg:#12131a; --panel:#1c1e2a; --panel2:#242738; --line:#33374d; --ink:#e7e9f3; --dim:#9aa0bd; --accent:#7db4ff; --good:#5fd08a; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--ink);
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif; }
  header { display:flex; align-items:center; gap:16px; padding:12px 18px;
    background:var(--panel); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:5; }
  header h1 { margin:0; font-size:18px; letter-spacing:.3px; }
  header h1 span { color:var(--accent); }
  .grow { flex:1; }
  .prog { font-size:13px; color:var(--dim); white-space:nowrap; }
  .prog b { color:var(--good); }
  button { font-family:inherit; font-weight:600; font-size:13px; color:var(--ink);
    background:var(--panel2); border:1px solid var(--line); border-radius:8px;
    padding:8px 14px; cursor:pointer; }
  button:hover { border-color:var(--accent); }
  button.primary { background:linear-gradient(160deg,#4f8fe0,#2f6fc0); border-color:#2f6fc0; }
  button.danger:hover { border-color:#e0576f; color:#ffb9c4; }

  .wrap { display:flex; height:calc(100% - 57px); }
  /* Sidebar */
  aside { width:230px; flex:none; overflow-y:auto; border-right:1px solid var(--line); background:var(--panel); padding:10px; }
  .grouphead { font-size:11px; letter-spacing:1.5px; color:var(--dim); text-transform:uppercase; margin:14px 6px 6px; }
  .grouphead:first-child { margin-top:4px; }
  .charbtn { display:flex; align-items:center; gap:9px; width:100%; text-align:left;
    background:transparent; border:1px solid transparent; border-radius:8px; padding:8px 10px; margin-bottom:3px; }
  .charbtn:hover { background:var(--panel2); }
  .charbtn.sel { background:var(--panel2); border-color:var(--accent); }
  .dot { width:14px; height:14px; border-radius:50%; flex:none; box-shadow:0 0 0 1px #0006 inset; }
  .charbtn .nm { flex:1; font-weight:600; font-size:14px; }
  .charbtn .cnt { font-size:11px; color:var(--dim); }
  .charbtn .cnt.full { color:var(--good); }

  /* Main */
  main { flex:1; overflow-y:auto; padding:20px 24px 60px; }
  .maintitle { display:flex; align-items:center; gap:12px; margin:0 0 4px; }
  .maintitle .dot { width:20px; height:20px; }
  .maintitle h2 { margin:0; font-size:22px; }
  .maintitle .role { font-size:12px; color:var(--dim); border:1px solid var(--line); padding:2px 8px; border-radius:99px; text-transform:capitalize; }
  .floatbtn { margin-left:auto; font-size:12px; padding:6px 14px; border-radius:8px; color:var(--dim); }
  .floatbtn:hover { border-color:var(--accent); color:var(--ink); }
  .floatbtn.on { background:#17324a; border-color:var(--accent); color:#bfe0ff; }
  .hint { color:var(--dim); font-size:13px; margin:2px 0 18px; }

  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px; }
  .slot { background:var(--panel); border:1px solid var(--line); border-radius:12px; overflow:hidden; }
  .slot .cap { display:flex; align-items:center; justify-content:space-between; padding:9px 11px; border-bottom:1px solid var(--line); }
  .slot .cap .lbl { font-weight:700; font-size:13px; }
  .slot .cap .tag { font-size:10px; color:var(--dim); letter-spacing:.5px; text-transform:uppercase; }
  .drop { position:relative; aspect-ratio:1/1; display:grid; place-items:center; cursor:pointer;
    background:
      linear-gradient(45deg,#0000 75%,#ffffff08 0) 0 0/20px 20px,
      linear-gradient(45deg,#ffffff08 25%,#0000 0) 10px 10px/20px 20px,
      var(--panel2); }
  .drop.empty { border:2px dashed var(--line); margin:10px; border-radius:10px; aspect-ratio:1/1; }
  .drop.empty:hover, .drop.over { border-color:var(--accent); background:var(--panel2); }
  .drop.nocos { border:2px dashed var(--line); margin:10px; border-radius:10px; aspect-ratio:1/1; opacity:.55; cursor:default; }
  .nocosbtn { font-size:10px; padding:3px 8px; border-radius:6px; letter-spacing:.3px; color:var(--dim); }
  .nocosbtn:hover { border-color:#c98a3a; color:#ffcf8f; }
  .nocosbtn.on { background:#3a2a17; border-color:#c98a3a; color:#ffcf8f; }
  .drop .plus { color:var(--dim); font-size:13px; text-align:center; pointer-events:none; }
  /* Crisp (nearest-neighbor) scaling so small pixel-art previews aren't blurry */
  .drop img { max-width:100%; max-height:100%; display:block;
    image-rendering:pixelated; image-rendering:crisp-edges; }
  .drop.over { outline:2px solid var(--accent); outline-offset:-4px; }
  .meta { display:flex; align-items:center; justify-content:space-between; padding:7px 11px; font-size:11px; color:var(--dim); border-top:1px solid var(--line); }
  .meta .fn { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:110px; }
  .meta .x { color:var(--dim); cursor:pointer; padding:0 4px; }
  .meta .x:hover { color:#ff9db0; }
  .note { position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
    background:#000c; border:1px solid var(--line); border-radius:10px; padding:10px 16px; font-size:13px; display:none; }

  /* Test / preview overlay */
  .overlay { position:fixed; inset:0; background:#000c; display:grid; place-items:center; z-index:20; padding:20px; }
  .overlay[hidden] { display:none; }
  .testcard { background:var(--panel); border:1px solid var(--line); border-radius:14px; width:min(560px,94vw); max-height:92vh; overflow:auto; }
  .testhead { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--line); }
  .testhead b { font-size:16px; }
  .stage { height:340px; display:grid; place-items:center; overflow:hidden;
    background:linear-gradient(160deg,#20364a,#141d28); border-bottom:1px solid var(--line); }
  .stage.missing::after { content:"no art in this slot yet"; color:var(--dim); font-size:13px; }
  #testCanvas { image-rendering:pixelated; image-rendering:crisp-edges; }
  .testctrls { display:flex; flex-wrap:wrap; gap:8px; padding:14px 16px 6px; }
  .tmode.on { background:linear-gradient(160deg,#4f8fe0,#2f6fc0); border-color:#2f6fc0; color:#fff; }
  .testzoom { display:flex; align-items:center; gap:10px; padding:8px 16px 16px; color:var(--dim); font-size:13px; }
  .testzoom input { flex:1; }

  /* Pets section */
  .petfield { margin:16px 0; }
  .petfield > label { display:block; font-size:11px; color:var(--dim); margin-bottom:7px; letter-spacing:.6px; text-transform:uppercase; }
  .petinput { background:var(--panel2); border:1px solid var(--line); border-radius:8px; color:var(--ink);
    padding:9px 12px; font-family:inherit; font-size:14px; width:100%; max-width:320px; }
  .petinput:focus { outline:none; border-color:var(--accent); }
  .behavtoggle { display:inline-flex; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  .behavtoggle button { border:none; border-radius:0; background:var(--panel2); padding:9px 18px; }
  .behavtoggle button.on { background:linear-gradient(160deg,#4f8fe0,#2f6fc0); color:#fff; }
  .petrow { display:flex; align-items:flex-start; gap:22px; flex-wrap:wrap; margin:6px 0 4px; }
  .petdrop { width:170px; }
  #petPrev { image-rendering:auto; background:linear-gradient(160deg,#20364a,#141d28); border:1px solid var(--line); border-radius:10px; }
  .newpetbtn { width:100%; text-align:center; color:var(--accent); border:1px dashed var(--line);
    border-radius:8px; padding:9px; margin-top:4px; background:transparent; }
  .newpetbtn:hover { border-color:var(--accent); background:var(--panel2); }
</style>
</head>
<body>
<header>
  <h1>🦆 <span>Forsnaken</span> Art Tool</h1>
  <div class="grow"></div>
  <div class="prog" id="prog">0 / 0 slots</div>
  <button id="testBtn">▶ Test</button>
  <button id="importBtn">Import…</button>
  <button id="clearBtn" class="danger">Clear all</button>
  <button id="exportBtn" class="primary">⬇ Export file</button>
  <input type="file" id="importFile" accept="application/json,.json" hidden>
</header>

<div class="wrap">
  <aside id="sidebar"></aside>
  <main id="main"></main>
</div>
<div class="note" id="note"></div>

<!-- Test / preview overlay -->
<div class="overlay" id="test" hidden>
  <div class="testcard">
    <div class="testhead"><b id="testName">Test</b><button id="testClose">✕ Close</button></div>
    <div class="stage" id="testStage"><canvas id="testCanvas" width="100" height="100"></canvas></div>
    <div class="testctrls" id="testModes"></div>
    <div class="testzoom">
      <button id="testFace">Face ▶</button>
      Zoom <input type="range" id="testZoom" min="1" max="10" value="5"><span id="testZoomV">5×</span>
    </div>
  </div>
</div>

<script src="anim-fx.js"></script>
<script>
const DATA = {"survivors":[{"id":"runner","name":"Runner","role":"survivor","color":"#ff80c0","abilities":[{"id":"dash","name":"Dash"},{"id":"smoke","name":"Smoke Bomb"}]},{"id":"engineer","name":"Engineer","role":"survivor","color":"#ffd84a","abilities":[{"id":"shield","name":"Shield"},{"id":"robot","name":"Robot"}]},{"id":"scout","name":"Scout","role":"survivor","color":"#6cb6ff","abilities":[{"id":"rally","name":"Rally"},{"id":"scan","name":"Scan"}]},{"id":"sentinel","name":"Frost Knight","role":"survivor","color":"#4ad0c0","abilities":[{"id":"burst","name":"Stun Burst"},{"id":"field","name":"Snow Field"}]},{"id":"sniper","name":"Sniper","role":"survivor","color":"#a070f0","abilities":[{"id":"shoot","name":"Shoot"},{"id":"reload","name":"Reload"},{"id":"sneak","name":"Sneak"}]},{"id":"fencer","name":"Fencer","role":"survivor","color":"#d04050","abilities":[{"id":"slash","name":"Slash"},{"id":"soda","name":"Soda"}]},{"id":"kacey","name":"Kacey","role":"survivor","color":"#ff9050","abilities":[{"id":"burger","name":"Burger!"},{"id":"meow","name":"MEOW!"}]},{"id":"angel","name":"Angel","role":"survivor","color":"#3a1860","abilities":[{"id":"stab","name":"Stab"},{"id":"duck","name":"Duck"},{"id":"spawner","name":"Spawner"}]},{"id":"pollen","name":"Pollen","role":"survivor","color":"#4a8c40","abilities":[{"id":"breathe","name":"Breathe"},{"id":"heal_station","name":"Heal Station"},{"id":"defence_station","name":"Defence Station"}]},{"id":"whamo","name":"Whamo","role":"survivor","color":"#ff9a3c","abilities":[{"id":"standee","name":"Standee"},{"id":"megaphone","name":"Megaphone"}]}],"killers":[{"id":"slasher","name":"Slasher","role":"killer","color":"#e94560","abilities":[{"id":"throw","name":"Throw Knife"},{"id":"frenzy","name":"Frenzy"}]},{"id":"stalker","name":"Stalker","role":"killer","color":"#7a2030","abilities":[{"id":"step","name":"Shadow Step"},{"id":"stalk","name":"Stalk"}]},{"id":"lunar","name":"Lunar","role":"killer","color":"#9070ff","abilities":[{"id":"build_portal","name":"Build Portal"},{"id":"teleport_portal","name":"Teleport"},{"id":"dash","name":"Dash"}]},{"id":"sly","name":"Sly","role":"killer","color":"#3a2a4a","abilities":[{"id":"trap_fire","name":"Trap"},{"id":"transform","name":"Transform"}]}]};

const ALL = [...DATA.survivors, ...DATA.killers];

// In-game items (ability-spawned objects + the generator). Each has its own slots.
const ITEMS = [
  { id: "gen",         name: "Generator",       role: "item", color: "#c9b24a",
    slots: [{ id: "working", label: "Working", tag: "item" }, { id: "done", label: "Completed", tag: "item" }] },
  { id: "knife",       name: "Throw Knife",     role: "item", color: "#c0c4cc", slots: [{ id: "sprite", label: "Knife", tag: "item" }] },
  { id: "bullet",      name: "Sniper Bullet",   role: "item", color: "#a070f0", slots: [{ id: "sprite", label: "Bullet", tag: "item" }] },
  { id: "robot",       name: "Robot",           role: "item", color: "#ffd84a", slots: [{ id: "sprite", label: "Robot", tag: "item" }] },
  { id: "burger",      name: "Burger",          role: "item", color: "#ff9050", slots: [{ id: "sprite", label: "Burger", tag: "item" }] },
  { id: "spawnpad",    name: "Spawn Pad",       role: "item", color: "#3a1860", slots: [{ id: "sprite", label: "Pad", tag: "item" }] },
  { id: "healstation", name: "Heal Station",    role: "item", color: "#4a8c40", slots: [{ id: "sprite", label: "Station", tag: "item" }] },
  { id: "defstation",  name: "Defence Station", role: "item", color: "#5a9cd0", slots: [{ id: "sprite", label: "Station", tag: "item" }] },
  { id: "clover",      name: "Clover",          role: "item", color: "#6cc04a", slots: [{ id: "sprite", label: "Clover", tag: "item" }] },
  { id: "portal",      name: "Portal",          role: "item", color: "#9070ff", slots: [{ id: "sprite", label: "Portal", tag: "item" }] },
  { id: "trap",        name: "Trap",            role: "item", color: "#c05050", slots: [{ id: "sprite", label: "Trap", tag: "item" }] },
  { id: "fireball",    name: "Fireball",        role: "item", color: "#ff6a2a", slots: [{ id: "sprite", label: "Fireball", tag: "item" }] },
  { id: "standee",     name: "Standee",         role: "item", color: "#ff9a3c", slots: [{ id: "sprite", label: "Standee", tag: "item" }] },
];

const ENTITIES = [...ALL, ...ITEMS];
const byId = Object.fromEntries(ENTITIES.map(c => [c.id, c]));

// Slots for an entity: items carry their own; characters get idle/walk-1/walk-2,
// killers also get Attack, plus one slot per ability. Sly also gets dino frames.
function slotsFor(c) {
  if (c.slots) return c.slots;
  const base = [
    { id: "idle",   label: "Idle",   tag: "pose" },
    { id: "walk-1", label: "Walk 1", tag: "pose" },
    { id: "walk-2", label: "Walk 2", tag: "pose" },
  ];
  if (c.role === "killer") base.push({ id: "attack", label: "Attack", tag: "attack" });
  const abs = c.abilities.map(a => ({ id: "ability-" + a.id, label: a.name, tag: "ability" }));
  let slots = base.concat(abs);
  if (c.id === "sly") slots = slots.concat([        // Sly's dino form is its own sprite set
    { id: "dino-idle",   label: "Dino Idle",   tag: "dino" },
    { id: "dino-walk-1", label: "Dino Walk 1", tag: "dino" },
    { id: "dino-walk-2", label: "Dino Walk 2", tag: "dino" },
    { id: "dino-fire",   label: "Dino Fire",   tag: "dino" },
  ]);
  return slots;
}
const TOTAL = ENTITIES.reduce((n, c) => n + slotsFor(c).length, 0);

// ── Persistence (IndexedDB — handles many images; falls back to memory) ──────
let store = {};                      // store[charId][slotId] = {filename,w,h,dataURL}
let flags = {};                      // flags[charId] = { floatWalk: true }
let pets = [];                       // [{id,name,price,behavior:"walk"|"float",image:{filename,w,h,dataURL}}]
let selected = ALL[0].id;
let dbOK = true;
const PET_W = 53, PET_H = 42;        // pets are auto-sized to fit this box (Blorb's size)
const isPetSel = () => typeof selected === "string" && selected.startsWith("pet:");
const curPet = () => isPetSel() ? pets.find(p => "pet:" + p.id === selected) : null;
const escHtml = s => String(s == null ? "" : s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
const escAttr = s => String(s == null ? "" : s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
function idb(mode, fn) {
  return new Promise((res) => {
    let r;
    try { r = indexedDB.open("forsnaken-art", 1); } catch { dbOK = false; return res(null); }
    r.onupgradeneeded = () => r.result.createObjectStore("kv");
    r.onerror = () => { dbOK = false; res(null); };
    r.onsuccess = () => { try {
      const os = r.result.transaction("kv", mode).objectStore("kv");
      const q = fn(os); q.onsuccess = () => res(q.result); q.onerror = () => res(null);
    } catch { dbOK = false; res(null); } };
  });
}
const save = () => idb("readwrite", os => os.put({ store, flags, pets }, "state"));
async function load() {
  const v = await idb("readonly", os => os.get("state"));
  if (v && v.store) { store = v.store; flags = v.flags || {}; pets = v.pets || []; return; }
  const old = await idb("readonly", os => os.get("store"));   // migrate older saves
  if (old) store = old;
}

// ── Rendering ────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const filledCount = cid => Object.keys(store[cid] || {}).length;
const totalFilled = () => ENTITIES.reduce((n, c) => n + filledCount(c.id), 0);

function renderSidebar() {
  const group = (title, list) => `<div class="grouphead">${title}</div>` + list.map(c => {
    const f = filledCount(c.id), t = slotsFor(c).length;
    return `<button class="charbtn ${c.id === selected ? "sel" : ""}" data-char="${c.id}">
      <span class="dot" style="background:${c.color}"></span>
      <span class="nm">${c.name}</span>
      <span class="cnt ${f === t ? "full" : ""}">${f}/${t}</span>
    </button>`;
  }).join("");
  const petGroup = `<div class="grouphead">Pets</div>` + pets.map(p =>
    `<button class="charbtn ${("pet:" + p.id) === selected ? "sel" : ""}" data-char="pet:${p.id}">
      <span class="dot" style="background:#59d0ff"></span>
      <span class="nm">${escHtml(p.name || "Pet")}</span>
      <span class="cnt">${(+p.price || 0)}🪙</span>
    </button>`).join("") +
    `<button class="newpetbtn" id="newPetBtn">＋ New pet</button>`;
  $("sidebar").innerHTML = group("Survivors", DATA.survivors) + group("Killers", DATA.killers)
    + group("Items", ITEMS) + petGroup;
  $("sidebar").querySelectorAll(".charbtn").forEach(b =>
    b.onclick = () => { selected = b.dataset.char; renderSidebar(); renderMain(); });
  const npb = $("newPetBtn"); if (npb) npb.onclick = newPet;
  $("prog").innerHTML = `<b>${totalFilled()}</b> / ${TOTAL} slots`;
}

function renderMain() {
  if (isPetSel()) return renderPet();
  const c = byId[selected], slots = slotsFor(c), cs = store[c.id] || {};
  const cards = slots.map(s => {
    const it = cs[s.id];
    const isAbility = s.tag === "ability";
    const isNo = it && it.noCostume;
    let body;
    if (isNo) {
      body = `<div class="drop nocos"><span class="plus">🚫<br>No costume<br><small>uses default look</small></span></div>`;
    } else if (it) {
      body = `<div class="drop" data-slot="${s.id}"><img src="${it.dataURL}" alt=""></div>
         <div class="meta"><span class="fn" title="${it.filename}">${it.filename}</span>
           <span>${it.w}×${it.h}</span><span class="x" data-clear="${s.id}" title="Remove">✕</span></div>`;
    } else {
      body = `<div class="drop empty" data-slot="${s.id}"><span class="plus">＋<br>drop / click<br>to add image</span></div>`;
    }
    // Ability slots get a "no costume" toggle (that ability doesn't need its own art).
    const capRight = isAbility
      ? `<button class="nocosbtn ${isNo ? "on" : ""}" data-nocos="${s.id}" title="This ability doesn't need its own art">${isNo ? "no costume ✓" : "no costume"}</button>`
      : `<span class="tag">${s.tag}</span>`;
    return `<div class="slot">
      <div class="cap"><span class="lbl">${s.label}</span>${capRight}</div>
      ${body}
    </div>`;
  }).join("");
  const floatOn = !!(flags[c.id] && flags[c.id].floatWalk);
  $("main").innerHTML =
    `<div class="maintitle"><span class="dot" style="background:${c.color}"></span>
       <h2>${c.name}</h2><span class="role">${c.role}</span>
       <button id="exportOneBtn" class="floatbtn" title="Export just this character's art (one file)">⬇ Export this one</button>
       ${c.role !== "item" ? `<button id="floatToggle" class="floatbtn ${floatOn ? "on" : ""}" title="Make this character's walk a floating hover (carries into the game)">🎈 Floating walk${floatOn ? " ✓" : ""}</button>` : ""}
     </div>
     <div class="hint">Add art for each pose — Idle, Walk 1, Walk 2, and one per ability.
       If an ability doesn't need its own look, hit <b>no costume</b> on that card.
       Everything autosaves${dbOK ? "" : " <b style='color:#ffb9c4'>(autosave off — export to save!)</b>"}.
       When finished, click <b>Export file</b> and send it to me.</div>
     <div class="grid">${cards}</div>`;
  // wire uploads / drops / clears
  $("main").querySelectorAll(".drop").forEach(d => {
    d.onclick = () => pickFile(d.dataset.slot);
    d.ondragover = e => { e.preventDefault(); d.classList.add("over"); };
    d.ondragleave = () => d.classList.remove("over");
    d.ondrop = e => { e.preventDefault(); d.classList.remove("over");
      const f = e.dataTransfer.files[0]; if (f) setImage(d.dataset.slot, f); };
  });
  $("main").querySelectorAll("[data-clear]").forEach(x =>
    x.onclick = e => { e.stopPropagation(); clearSlot(x.dataset.clear); });
  $("main").querySelectorAll("[data-nocos]").forEach(b =>
    b.onclick = e => { e.stopPropagation(); toggleNoCostume(b.dataset.nocos); });
  const eo = $("exportOneBtn"); if (eo) eo.onclick = exportOne;
  const ft = $("floatToggle");
  if (ft) ft.onclick = () => {
    if (flags[selected] && flags[selected].floatWalk) { delete flags[selected].floatWalk; if (!Object.keys(flags[selected]).length) delete flags[selected]; }
    else (flags[selected] || (flags[selected] = {})).floatWalk = true;
    save(); renderMain();
  };
}

// ── Pets ─────────────────────────────────────────────────────────────────────
function newPet() {
  const id = "p" + Date.now().toString(36) + Math.floor(Math.random() * 1e5).toString(36);
  pets.push({ id, name: "New Pet", price: 100, behavior: "walk", image: null });
  selected = "pet:" + id;
  save(); renderSidebar(); renderMain();
}
function renderPet() {
  const p = curPet();
  if (!p) { selected = ALL[0].id; return renderMain(); }
  const img = p.image;
  const drop = img
    ? `<div class="drop" id="petDrop"><img src="${img.dataURL}" alt=""></div>
       <div class="meta"><span class="fn" title="${escAttr(img.filename)}">${escHtml(img.filename)}</span>

function serializeChar(c) {

    return v.noCostume
      ? { slot: s.id, label: s.label, kind: s.tag, noCostume: true }
      : { slot: s.id, label: s.label, kind: s.tag, filename: v.filename, w: v.w, h: v.h, image: v.dataURL };
  });
  const out = { id: c.id, name: c.name, role: c.role,
           resolved: entries.map(e => e.slot),
           missing: slots.filter(s => !cs[s.id]).map(s => s.id),
           slots: entries };

}

}

      }

    }

          ? { noCostume: true }

// ── Test / preview — canvas driven by the game's real animation code ─────────
const AN = window.ForsakenAnim;   // from anim-fx.js (timing, transforms, FX)

const P = { x: 50, y: 50, alive: true };            // simulated player at canvas center

function modesFor(c) {
  if (c.role === "item") return slotsFor(c).map(s => ({ id: s.id, label: s.label, kind: "static", slot: s.id, base: s.id }));
  const m = [
    { id: "idle", label: "Idle", kind: "static", slot: "idle", base: "idle" },

function drawTest(now) {

    const img = slotImg(c.id, testMode) || slotImg(c.id, slotsFor(c)[0].id);
    const stage = $("testStage");
    if (!img) { stage.classList.add("missing"); return; }
    stage.classList.remove("missing");

    ctx.translate(P.x, P.y);

      if (tr.actScaleY != null) sy = tr.actScaleY;

      if (tr.bobPx != null) bob = tr.bobPx;
      if (tr.swayRad != null) sway = tr.swayRad;

    }

  const modes = modesFor(c);
  if (!modes.some(m => m.id === testMode)) testMode = modes[0].id;
  $("testModes").innerHTML = modes.map(m => `<button class="tmode ${m.id === testMode ? "on" : ""}" data-mode="${m.id}">${m.label}</button>`).join("");
  $("testModes").querySelectorAll("[data-mode]").forEach(b =>
    b.onclick = () => { testMode = b.dataset.mode; resetAnim(); renderTest(); });
}
function openTest() {
  if (isPetSel()) { toast("The pet has a live preview right in its editor."); return; }
  if (!AN) { toast("Animation file (anim-fx.js) didn't load."); return; }
  $("test").hidden = false; resetAnim(); renderTest(); sizeCanvas();
  cancelAnimationFrame(testRAF); testRAF = requestAnimationFrame(loopTest);
}
function closeTest() { $("test").hidden = true; cancelAnimationFrame(testRAF); testRAF = null; }
$("testBtn").onclick = openTest;
$("testClose").onclick = closeTest;
$("test").onclick = e => { if (e.target.id === "test") closeTest(); };
$("testFace").onclick = () => { testDir = -testDir; $("testFace").textContent = testDir < 0 ? "Face ◀" : "Face ▶"; };
$("testZoom").oninput = e => { testZoom = +e.target.value; $("testZoomV").textContent = testZoom + "×"; sizeCanvas(); };

$("exportBtn").onclick = exportFile;
$("importBtn").onclick = () => $("importFile").click();
$("importFile").onchange = e => { if (e.target.files[0]) importFile(e.target.files[0]); e.target.value = ""; };
$("clearBtn").onclick = () => { if (confirm("Remove ALL added art? (Export first if you want to keep it.)"))
  { store = {}; flags = {}; save(); renderSidebar(); renderMain(); } };

// ── Boot ─────────────────────────────────────────────────────────────────────
load().then(() => { renderSidebar(); renderMain(); });
</script>
</body>
